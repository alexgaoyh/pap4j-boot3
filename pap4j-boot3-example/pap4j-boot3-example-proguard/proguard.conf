#指定Java的版本
-target 17
#proguard会对代码进行优化压缩，他会删除从未使用的类或者类成员变量等
-dontshrink
#是否关闭字节码级别的优化，如果不开启则设置如下配置
-dontoptimize
#保持目录结构，否则spring的自动注入无法使用
#-keepdirectories
# 对于类成员的命名的混淆采取唯一策略
#-useuniqueclassmembernames
#混淆类名之后，对使用Class.forName('className')之类的地方进行相应替代
-adaptclassstrings
#混淆时不生成大小写混合的类名，默认是可以大小写混合
#-dontusemixedcaseclassnames
#对异常、注解信息予以保留
-keepattributes  Exceptions,InnerClasses,Signature,Deprecated,SourceFile,LineNumberTable,*Annotation*,EnclosingMethod
# 此选项将保存接口中的所有原始名称（不混淆）-->
-keepnames interface ** { *; }
#保留参数名，因为控制器，或者Mybatis等接口的参数如果混淆会导致无法接受参数，xml文件找不到参数
-keepparameternames
# 保留枚举成员及方法
-keepclassmembers enum * { *; }
# 不混淆所有的set/get方法，毕竟项目中使用的部分第三方框架（例如Shiro）会用到大量的set/get映射
-keepclassmembers public class * {void set*(***);*** get*();}
-keep public class * extends jakarta.persistence.Entity
-keep public class * extends jakarta.persistence.Table
-keepclassmembers class * {
    @jakarta.persistence.* *;
}
# 不混淆所有类,保存原始定义的注释-
-keepclassmembers class * {
@org.springframework.context.annotation.Bean *;
@org.springframework.beans.factory.annotation.Autowired *;
@org.springframework.beans.factory.annotation.Value *;
@org.springframework.stereotype.Service *;
@org.springframework.stereotype.Component *;
@org.springframework.scheduling.annotation.Scheduled *;
}
#保留Serializable序列化的类不被混淆
-keepclassmembers class * implements java.io.Serializable {*;}

#忽略warn消息
-ignorewarnings
#忽略note消息
-dontnote
#打印配置信息
-printconfiguration

# 指定不打印有关配置中潜在错误或遗漏的注释，例如类名中的拼写错误或缺少可能有用的选项
-dontnote cn.net.pap.example.proguard.Pap4jBoot3ExampleProguardApplication
#保留启动类
-keep public class cn.net.pap.example.proguard.Pap4jBoot3ExampleProguardApplication {*;}

# ------------------------------
# JPA/Hibernate 保留规则
# ------------------------------

# 保留@Id 和 @IdClass 标记的类和字段
-keep @jakarta.persistence.Id class * { *; }
-keep @jakarta.persistence.IdClass class * { *; }

# 保留实体类中 @Column、@JoinColumn、@Embedded、@EmbeddedId 注解字段
-keepclassmembers class * {
    @jakarta.persistence.Column *;
    @jakarta.persistence.JoinColumn *;
    @jakarta.persistence.Embedded *;
    @jakarta.persistence.EmbeddedId *;
}

# 只保留 entity 包下的实体类字段和方法，防止 @IdClass 映射失效
-keep class cn.net.pap.example.proguard.entity.** {
    <fields>;
    public <methods>;
}
-keepclassmembers class cn.net.pap.example.proguard.entity.** {
    @jakarta.persistence.Id *;
    @jakarta.persistence.Column *;
    @jakarta.persistence.JoinColumn *;
    @jakarta.persistence.Embedded *;
    @jakarta.persistence.EmbeddedId *;
}

# 保留 config 包下的所有类和类名，防止 Hibernate 通过类名加载失败
-keep class cn.net.pap.example.proguard.config.** { *; }

# 保留实体类的 getter/setter 方法，防止 @IdClass 属性找不到
-keepclassmembers class * {
    public <fields>;
    public ** get*();
    public void set*(**);
}

# 保留所有注解
-keepattributes *Annotation*
