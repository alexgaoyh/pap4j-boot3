<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>API Tester</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 30px;
            max-width: 900px;
        }

        input, select, textarea, button {
            padding: 6px;
            margin: 4px 0;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
        }

        .headers, .bodyEditor {
            margin-bottom: 10px;
        }

        .pair {
            display: flex;
            gap: 8px;
            margin-bottom: 5px;
            align-items: center;
        }

        textarea {
            width: 100%;
        }

        pre {
            background: #f8f8f8;
            padding: 10px;
            white-space: pre-wrap;
            word-wrap: break-word;
            border: 1px solid #ddd;
        }

        /* form-data 布局优化 */
        .pair .key {
            flex: 3;
        }

        .pair .type {
            flex: 1.5;
        }

        .pair .value {
            flex: 4.5;
        }

        .pair button {
            flex: 1;
        }
    </style>
</head>
<body>

<h1>🌐 pap4j-boot3 Example API Tester</h1>
<p style="font-size: 1rem; color: #555;">
    Author: <a href="http://pap-docs.pap.net.cn" target="_blank" rel="noopener noreferrer">alexgaoyh</a>
</p>

<label>请求 URL</label>
<input id="url" value="https://httpbin.org/post" style="width:100%"/>

<label>方法</label>
<select id="method">
    <option>GET</option>
    <option selected>POST</option>
    <option>PUT</option>
    <option>DELETE</option>
</select>

<h3>Headers</h3>
<div id="headers" class="headers"></div>
<button onclick="addHeader()">➕ 添加 Header</button>

<h3>Content-Type</h3>
<select id="contentType" onchange="updateBodyEditor()">
    <option value="">(自动检测)</option>
    <option value="application/json">application/json</option>
    <option value="application/x-www-form-urlencoded">application/x-www-form-urlencoded</option>
    <option value="multipart/form-data">multipart/form-data</option>
    <option value="text/plain">text/plain</option>
</select>

<h3>请求 Body</h3>
<div id="bodyEditor" class="bodyEditor"></div>
<button id="addFormRowBtn">➕ 添加字段</button>

<button onclick="sendRequest()">🚀 发送请求</button>

<h3>响应结果</h3>
<pre id="response"></pre>

<script>
    const headersDiv = document.getElementById('headers');
    const bodyEditor = document.getElementById('bodyEditor');
    const responseDiv = document.getElementById('response');
    const contentTypeSel = document.getElementById('contentType');
    const addFormRowBtn = document.getElementById('addFormRowBtn');

    function addHeader(k = '', v = '') {
        const div = document.createElement('div');
        div.className = 'pair';
        div.innerHTML = `<input placeholder="Header 名" value="${k}" style="flex:3"/>
                         <input placeholder="Header 值" value="${v}" style="flex:6"/>
                         <button onclick="this.parentElement.remove()">删除</button>`;
        headersDiv.appendChild(div);
    }

    // 添加 form-data 行
    function addFormDataRow(key = '', type = 'text', value = '') {
        const div = document.createElement('div');
        div.className = 'pair';

        const keyInput = document.createElement('input');
        keyInput.placeholder = '字段名';
        keyInput.value = key;
        keyInput.className = 'key';

        const typeSelect = document.createElement('select');
        const optText = document.createElement('option');
        optText.value = 'text';
        optText.innerText = 'Text';
        const optFile = document.createElement('option');
        optFile.value = 'file';
        optFile.innerText = 'File';
        typeSelect.appendChild(optText);
        typeSelect.appendChild(optFile);
        typeSelect.value = type;
        typeSelect.className = 'type';

        let valueInput = document.createElement('input');
        if (type === 'file') valueInput.type = 'file'; else {
            valueInput.type = 'text';
            valueInput.value = value;
            valueInput.placeholder = '字段值';
        }
        valueInput.className = 'value';

        const removeBtn = document.createElement('button');
        removeBtn.innerText = '删除';
        removeBtn.onclick = () => bodyEditor.removeChild(div);

        typeSelect.onchange = () => {
            const newType = typeSelect.value;
            const newInput = document.createElement('input');
            if (newType === 'file') newInput.type = 'file';
            else {
                newInput.type = 'text';
                newInput.placeholder = '字段值';
                newInput.value = valueInput.value;
            }
            newInput.className = 'value';
            div.replaceChild(newInput, valueInput);
            valueInput = newInput;
        };

        div.appendChild(keyInput);
        div.appendChild(typeSelect);
        div.appendChild(valueInput);
        div.appendChild(removeBtn);

        bodyEditor.appendChild(div);
    }

    // 切换Body类型
    function updateBodyEditor() {
        const type = contentTypeSel.value;
        bodyEditor.innerHTML = '';
        if (type === 'application/json' || type === 'text/plain' || !type) {
            bodyEditor.innerHTML = `<textarea id="bodyText" rows="8" placeholder='{"key":"value"}'></textarea>`;
            addFormRowBtn.style.display = 'none';
        } else {
            addFormDataRow();
            addFormRowBtn.style.display = 'inline-block';
        }
    }

    addFormRowBtn.onclick = () => addFormDataRow();

    // 组装 FormData，符合后端 @RequestParam Map<String,String> params + List<MultipartFile> files
    function buildMultipartData() {
        const fd = new FormData();
        const url = document.getElementById('url').value.trim();
        const method = document.getElementById('method').value.trim();

        // 🚨 确保 target url 传到后端
        fd.append('url', url);
        fd.append('method', method);

        // 遍历 bodyEditor
        bodyEditor.querySelectorAll('.pair').forEach(div => {
            const [keyInput, typeSelect, valueInput] = div.children;
            const key = keyInput.value.trim();
            if (!key) return;

            if (typeSelect.value === 'file') {
                if (valueInput.files.length > 0) {
                    // 文件部分
                    fd.append('files', valueInput.files[0]);
                    // 也可以将文件字段名写入 params
                    fd.append(key, valueInput.files[0].name);
                }
            } else {
                // 普通字段
                fd.append(key, valueInput.value);
            }
        });

        return fd;
    }


    async function sendRequest() {
        const url = document.getElementById('url').value;
        const method = document.getElementById('method').value;
        const type = contentTypeSel.value;

        const headers = {};
        headersDiv.querySelectorAll('.pair').forEach(div => {
            const [k, v] = Array.from(div.querySelectorAll('input')).map(i => i.value.trim());
            if (k) headers[k] = v;
        });
        if (type && type !== 'multipart/form-data') headers['Content-Type'] = type;

        responseDiv.textContent = '⏳ 正在请求...';

        try {
            let res;
            if (type === 'multipart/form-data') {
                const fd = buildMultipartData();
                res = await fetch('/proxy/multipart', {method: 'POST', body: fd});
            } else if (type === 'application/x-www-form-urlencoded') {
                const fd = buildMultipartData();
                res = await fetch('/proxy/form', {method: 'POST', body: fd});
            } else {
                const body = document.getElementById('bodyText')?.value || '';
                res = await fetch('/proxy', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url, method, headers, body})
                });
            }
            const text = await res.text();
            responseDiv.textContent = text;
        } catch (err) {
            responseDiv.textContent = '❌ Error: ' + err;
        }
    }

    // 初始化
    addHeader('Accept', 'application/json');
    updateBodyEditor();
</script>
<style>
    /* 调整原 body 布局，给右侧历史面板留出空间，完全不破坏原有的 flex 和 padding */
    body {
        padding-right: 340px !important;
    }

    /* 历史记录侧边栏样式 */
    #historyPanel {
        position: fixed;
        top: 0;
        right: 0;
        width: 320px;
        height: 100vh;
        background: #f9f9f9;
        border-left: 1px solid #ddd;
        padding: 20px;
        box-sizing: border-box;
        overflow-y: auto;
        box-shadow: -2px 0 8px rgba(0,0,0,0.05);
        z-index: 1000;
    }

    #historyPanel h2 {
        margin-top: 0;
        font-size: 1.2rem;
        color: #333;
    }

    .history-item {
        background: #fff;
        border: 1px solid #eee;
        padding: 12px;
        margin-bottom: 12px;
        border-radius: 6px;
        cursor: pointer;
        position: relative;
        transition: box-shadow 0.2s;
        word-break: break-all;
    }

    .history-item:hover {
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        border-color: #ccc;
    }

    .history-item .method {
        font-weight: bold;
        margin-right: 5px;
    }

    .history-item .url {
        font-size: 0.9rem;
        color: #444;
    }

    .history-item .time {
        font-size: 0.8rem;
        color: #888;
        margin-top: 6px;
    }

    .delete-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        background: transparent;
        color: #ff4d4f;
        border: none;
        cursor: pointer;
        font-size: 1rem;
        padding: 0;
    }

    .delete-btn:hover {
        color: #d9363e;
        transform: scale(1.1);
    }
</style>

<div id="historyPanel">
    <h2>📜 请求历史</h2>
    <div id="historyList"></div>
</div>

<script>
    (function initHistoryFeature() {
        const HISTORY_KEY = 'api_tester_history';
        const historyListEl = document.getElementById('historyList');

        // 1. 获取和保存数据的辅助函数
        function getHistory() {
            try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
            catch (e) { return []; }
        }

        function saveHistory(data) {
            localStorage.setItem(HISTORY_KEY, JSON.stringify(data));
        }

        // 2. 提取当前表单数据并保存
        function saveCurrentRequest() {
            const url = document.getElementById('url').value.trim();
            if (!url) return;

            const method = document.getElementById('method').value;
            const contentType = document.getElementById('contentType').value;

            // 提取 Headers
            const headers = [];
            document.getElementById('headers').querySelectorAll('.pair').forEach(div => {
                const inputs = div.querySelectorAll('input');
                const k = inputs[0].value.trim();
                const v = inputs[1].value.trim();
                if (k) headers.push({ k, v });
            });

            // 提取 Body
            let bodyText = '';
            let formData = [];
            if (contentType === 'application/json' || contentType === 'text/plain' || !contentType) {
                const textEl = document.getElementById('bodyText');
                if (textEl) bodyText = textEl.value;
            } else {
                document.getElementById('bodyEditor').querySelectorAll('.pair').forEach(div => {
                    const keyInput = div.querySelector('.key');
                    const typeSelect = div.querySelector('.type');
                    const valueInput = div.querySelector('.value');
                    if (keyInput && keyInput.value.trim()) {
                        formData.push({
                            key: keyInput.value.trim(),
                            type: typeSelect.value,
                            // 由于浏览器安全限制，无法保存并重新赋值文件路径，因此置空
                            value: typeSelect.value === 'file' ? '' : valueInput.value
                        });
                    }
                });
            }

            const record = {
                id: Date.now(), // 唯一标识
                time: new Date().toLocaleString(),
                url,
                method,
                contentType,
                headers,
                bodyText,
                formData
            };

            const history = getHistory();
            history.unshift(record); // 最新记录插在最前
            if (history.length > 50) history.pop(); // 最多保留 50 条防止炸栈
            saveHistory(history);
            renderHistory();
        }

        // 3. 渲染历史列表
        window.renderHistory = function() {
            const history = getHistory();
            historyListEl.innerHTML = history.length === 0 ? '<p style="color:#888;font-size:0.9rem;">暂无历史记录</p>' : '';

            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.onclick = (e) => {
                    // 防止点击删除按钮时触发回显
                    if(e.target.className.includes('delete-btn')) return;
                    restoreRequest(item.id);
                };

                // 为不同请求方法上色
                let methodColor = '#333';
                if(item.method === 'GET') methodColor = '#0070c0';
                if(item.method === 'POST') methodColor = '#008000';
                if(item.method === 'PUT') methodColor = '#d97706';
                if(item.method === 'DELETE') methodColor = '#cc0000';

                div.innerHTML = `
                    <button class="delete-btn" onclick="deleteHistoryItem(${item.id})" title="删除">✖</button>
                    <div>
                        <span class="method" style="color:${methodColor}">${item.method}</span>
                        <span class="url">${item.url}</span>
                    </div>
                    <div class="time">${item.time}</div>
                `;
                historyListEl.appendChild(div);
            });
        };

        // 4. 删除单条记录
        window.deleteHistoryItem = function(id) {
            let history = getHistory();
            history = history.filter(item => item.id !== id);
            saveHistory(history);
            renderHistory();
        };

        // 5. 回显数据到主界面
        window.restoreRequest = function(id) {
            const record = getHistory().find(item => item.id === id);
            if (!record) return;

            document.getElementById('url').value = record.url;
            document.getElementById('method').value = record.method;
            document.getElementById('contentType').value = record.contentType || '';

            // 清空并重建 Headers
            const hdrsDiv = document.getElementById('headers');
            hdrsDiv.innerHTML = '';
            record.headers.forEach(h => window.addHeader(h.k, h.v));

            // 触发你原有的更新 Body 逻辑
            window.updateBodyEditor();

            // 使用 setTimeout 确保 updateBodyEditor 的 DOM 渲染完成之后再赋值
            setTimeout(() => {
                if (record.contentType === 'application/json' || record.contentType === 'text/plain' || !record.contentType) {
                    const textEl = document.getElementById('bodyText');
                    if (textEl) textEl.value = record.bodyText || '';
                } else {
                    const bdyEdtr = document.getElementById('bodyEditor');
                    bdyEdtr.innerHTML = ''; // 清掉 updateBodyEditor 默认增加的那个空行
                    record.formData.forEach(fd => {
                        window.addFormDataRow(fd.key, fd.type, fd.value);
                    });
                }
            }, 0);
        };

        // 6. 核心：拦截你原有的 sendRequest 函数（AOP切面思路）
        const originalSendRequest = window.sendRequest;
        window.sendRequest = async function() {
            // 在发请求前静默保存记录
            saveCurrentRequest();
            // 唤起你原本的发送逻辑
            if (originalSendRequest) {
                await originalSendRequest.apply(this, arguments);
            }
        };

        // 页面加载完毕后初次渲染历史记录
        renderHistory();
    })();
</script>
</body>
</html>
