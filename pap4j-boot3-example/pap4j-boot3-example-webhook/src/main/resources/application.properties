server.port=30000
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=3600s
spring.datasource.url=jdbc:h2:mem:pap4j-boot3-example-webhook;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.hikari.leak-detection-threshold=3000
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
spring.jpa.properties.hibernate.format_sql=true

